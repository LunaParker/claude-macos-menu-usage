name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v5

      - name: Select latest Xcode
        run: |
          XCODE=$(ls -d /Applications/Xcode*.app 2>/dev/null | sort -V | tail -1)
          echo "Using $XCODE"
          sudo xcode-select -s "$XCODE"
          xcodebuild -version

      - name: Test
        run: |
          xcodebuild -project ClaudeUsage.xcodeproj \
            -scheme ClaudeUsage \
            -configuration Debug \
            -destination 'platform=macOS' \
            test

      - name: Build
        run: |
          xcodebuild -project ClaudeUsage.xcodeproj \
            -scheme ClaudeUsage \
            -configuration Release \
            -derivedDataPath build \
            build

      - name: Package
        run: |
          cd build/Build/Products/Release
          zip -ry "$GITHUB_WORKSPACE/MenuBarUsageForClaude.zip" \
            "Menu Bar Usage for Claude.app"

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: Menu-Bar-Usage-for-Claude
          path: MenuBarUsageForClaude.zip
